[rke2_servers]
server1 ansible_host= ansible_user=ubuntu

[rke2_agents]
agent1 ansible_host= ansible_user=ubuntu

[all:vars]
ansible_become=true
ansible_become_method=sudo
ansible_become_user=root
ansible_become_password=
ansible_ssh_private_key_file='~/.ssh/<key-file>.pem'
ansible_ssh_common_args='-o StrictHostKeyChecking=no'